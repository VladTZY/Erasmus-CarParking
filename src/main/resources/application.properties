# ── H2 in-memory datasource ──────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:parking;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── H2 console (accessible at http://localhost:8080/h2-console) ───────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Spring Modulith ───────────────────────────────────────────────────────────
# Event publication registry uses JPA (via starter-jpa) — schema managed by Hibernate

# ── JWT ───────────────────────────────────────────────────────────────────────
# Base64-encoded secret (>= 256 bits). Regenerate for production:
#   openssl rand -base64 64
app.jwt.secret=WnVwZXJTZWNyZXRLZXlGb3JEaWdpdGFsUGFya2luZ01hbmFnZW1lbnQyMDI1IQ==

spring.profiles.active=local

# ── OpenRouter ────────────────────────────────────────────────────────────────
# Key is loaded from application-local.properties (gitignored)
openrouter.api-key=${OPENROUTER_API_KEY:changeme}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.modulith=DEBUG
logging.level.com.parking=DEBUG
