# ── Test-specific overrides ────────────────────────────────────────────────
# Use 'test' profile: clears 'local' (no application-local.properties needed)
# and prevents @Profile("!test") seeders from running during tests
spring.profiles.active=test

# Provide a dummy key so OpenRouterService bean creation succeeds
# (scan-plate endpoint is not tested in integration tests)
openrouter.api-key=test-key-not-used

# Speed up BCrypt for tests
spring.security.crypto.strength=4

# JWT secret (copied from main application.properties which is shadowed by this file)
app.jwt.secret=WnVwZXJTZWNyZXRLZXlGb3JEaWdpdGFsUGFya2luZ01hbmFnZW1lbnQyMDI1IQ==

# Suppress open-in-view warning
spring.jpa.open-in-view=false
